<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Value Types in JS</title>
</head>
<body>
    <script>
        //JS data value types
        //primitive- immutable-single value data types in js
        //string,number,boolean,undefined,null, bigint,and symbol

        //string
        var myName="namdini gupta";
        console.log(myName);
        //number
        var myMob=46489597;
        console.log(myName + "mobile no is" + myMob);
        //boolean
        var isMarried=false;
        console.log(myName + "is married" + isMarried);
        //undefined
        var myEmail;
        console.log(myEmail);
        console.log(typeof(myEmail));
        //null
        var myAddress;
        console.log(myAddress);
        console.log(typeof(myAddress));
        //big int
        var myNum=BigInt(67494033048363346389495);
        console.log(myNum);
        console.log(typeof(myNum));
        //symbol
        var var1="vikas";
        var var2="vikas";     //true
        console.log(var1==var2);

        var var1=Symbol("vikas");
        var var2=Symbol("vikas");     //false
        console.log(var1==var2);

        //reference type(object)--mutable in memory and keep the data in key value pair
        //object {} , function () , array []
        let myInfo={
            name:"Nandini",
             age:18 , 
             isMarried:false ,
              address:"Muzaffarnagar",
              branch:"CSE",
              section:23
        };
        console.log(myInfo);
        console.log(myInfo.name + " " + myInfo.age);

        //object length
        var keys=object.keys(myInfo);
        console.log(keys.length);
        //function - block of code to perform particular task

        function cal(){
            var num1=45;
            var num2=40;
            var add=num1+num2;
            console.log("addition of two numbers is "+ add);
        }
        cal();

        //array - collection of any data types
        let studentList=["stu1","stu2","stu3","stu4"];
        console.log(studentList[0]);
        //for different data types
        let stu1=["nandini", 18 , false, "Gzb","CSE",null,18];
        console.log(stu1);
        console.log(stu1.length);

        for(let i=0;i<stu1.length;i++){
            console.log(stu1[i]);
        }

    </script>
</body>
</html>
