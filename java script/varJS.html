<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>java script</title>
</head>
<body>
    <script>
     // JS Variables...contains either value or not....
     var myName="Nandini";//var declaration global
     document.write(myName);
     console.log(myName);//hosting phase...value undefined(var) 

      myName="subhash";//redeclare and reassign
     console.log(myName);


     function demo(){
        var msg="hello ABES";//block or function scope
        console.log(msg);
     }
     demo();
     //variable declaration using let and const

     
     let myNumber=23456687;
     console.log(myNumber);

      myNumber=8764849;//no redeclare but reassign
      console.log(myNumber);

     const myEmail="nandini123@gmail.com";
     console.log(myEmail);

     myEmail="nan123@gmail.com";//no redeclare no reassign
     console.log(myEmail);
     //JS Execution
     //JS Scope
     //Variable declaration
     //difference between var,let and const
    </script>
</body>
</html>
