<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>layout 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
     rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
     <style>
        .box{
            border:2px;
            margin-bottom:
            height:auto

        }
     </style>
    </head>
<body>
    <div class="container">
        <!--header start-->
        <div class="row box">
            <div class="col-lg-12">
                <h2 class="bg-primary text-center">Heading</h2>
            </div>
        </div>
        <!--header end-->
        <!--navigation-->
            <div class="row box">
                <div class="col-lg-12">
                    <h2>Navigation</h2>
                </div>
            </div><!--navigation end-->
          <!--main content start-->
            <div class="row box gy-2">
                <div class="col-lg-6 bg-info d-flex">
                    <!--left1-->
                    <div class="col-lg-6 w-50 bg-primary">
                        <h2>Left 1</h2>
                    </div>
                    <!--left1 end-->

                    <!--left 2 -->
                    <div class="col-lg-6 w-50 bg-info">
                        <h2>Left 2</h2>
                    </div>
                    <!--left2 end-->
                </div>
                <div class="col-lg-6  bg-secondary">
                    <div class="col-lg-6 bg-primary">
                        <h2> right top</h2>
                    </div>
                    <div class="col-lg-6 bg-info">
                        <h2>right bottom</h2>
                    </div>
                </div>
            </div><!--main content end-->
          <!--footer start-->
            <div class="row box">
                <div class="col-lg-12">
                    <h2>Footer</h2>
                </div>
            </div><!--footer end-->

        </div>
    </div><!--container end-->
</body>
</html>
