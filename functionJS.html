<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function in JS</title>
</head>
<body>
    <script>
        //function - block of code , used or defined to perform specific task
        //Types of Function (behaviour of function is synchronous by default)
        //normal function - with para,without para and with default

        //normal function without parameters
        function demo(){
            console.log("hello JS");
        }
        demo(); //function calling

        //with parameters

        function demo1(text){
            console.log("Hello " + text);
        }
        demo1("React");

        //default parameters

        function add(a,b=10){
        console.log("Addition is " + (a+b));
        }
        add(123);
        function cal(){
    
        function mul(x,y){
            console.log(x-y);
        }

        function sub(p,r){
            console.log(p-r);
        }
        mul(3,6);
        sub(9,6);
        add(3,6);
    }
    cal();


    let msg=function(){
        console.log("Hello ABES");
        //console.log(typeof(msg));
    }
    msg();
    //short code for above function i.e. arrow function
    let msg1=()=>console.log("Hello ABESEC");
    msg1();

    //arrow function with multiple lines

    let msg2=(a,b)=>{
        var num1=a;
        var num2=b;
        var res=num1/num2;
        console.log("Result is " + res);
    }
    msg2(10,20);

    //IIFE

    (function(){
        console.log("Hello World!");
    })();
     //short code for above function
    (msg=>console.log("hello"))();

    //promises - an object representing an asynchronous operations

    let myPromise=new Promise(function(resolve,reject){
        let age=25;
        if(age>=18){
            resolve("valid age");
        }
        else{
            reject("wait for next year");
        }
    }); //new refers to use constructor
    myPromise.then(msg=>console.log(msg)).catch(error=>console.log(error));
     console.log(myPromise);
     //api....https://dummyjson.com/products

     async function userInfo(){
        try{
      // let userData=await fetch('https://api.github.com/users/NandiniGupta1174');
       let response=await userData.json();
       console.log(response);
     }  //try end

     catch(error){
        console.log(error);
     } //catch end
    } //function end
     userInfo();

     let num=[4,6,7,8,9,3,2,1];

     //map
     let square=num.map(n=>n*n);
     console.log(square);

     //reduce
     let sum =num.reduce((total,n)=>total+n);
     console.log(sum);

     //filter
     let sorting=num.filter(n=>n>2);
     console.log(sorting);

     //forEach
     num.forEach(n=>console.log(n*2));


     //local storage - 
     let myInfo={
        name: 'Nandini',
        age: '18',
        email:'123nandinigupta@gmail.com',
        mob:7505847885
     };

     //storage of object by converting it into a json string
     localStorage.setItem('myInfo',JSON.stringify(myInfo));

     //retrive and parse the JSON string back into an object
     let storeData=JSON.parse(localStorage.getItem('myInfo'));
     console.log(storeData.name);
    </script>
</body>
</html>
